name: Automated Tests and Deployment
on:
  push:
    branches:
    - deployment-CICD
  pull_request:
    branches:
    - deployment-CICD
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run Tests
        working-directory: Backend
        run: python -m pytest tests/ -v --cov=. --cov-report=term-missing --junitxml=test-results.xml

      - name: Upload Test Results
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: Backend/test-results.xml

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mental-health-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'
    steps:
      - name: Deploy DockerHub image to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -e
          IMAGE="${DOCKERHUB_USERNAME}/mental-health-app:latest"

          # Clone the Space repo (empty on first run).
          git clone "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}" space
          cd space

          # HF reads this YAML header to know it's a Docker Space on port 7860.
          cat > README.md <<EOF
          ---
          title: RAG Mental Health Chatbot Backend
          emoji: 🧠
          colorFrom: blue
          colorTo: indigo
          sdk: docker
          app_port: 7860
          ---

          # RAG Mental Health Chatbot

          Runs the pre-built image \`${IMAGE}\` published by CI from the main branch.
          EOF

          # One-line Dockerfile that RUNS the published image instead of
          # rebuilding from source. CACHE_BUST (commit SHA) forces HF to
          # re-pull :latest on every deploy.
          cat > Dockerfile <<EOF
          FROM ${IMAGE}
          ARG CACHE_BUST=${GITHUB_SHA}
          RUN echo "Deployed build ${GITHUB_SHA}"
          EOF

          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add README.md Dockerfile
          git commit -m "Deploy ${IMAGE} (${GITHUB_SHA})" || echo "No changes to commit"
          git push

          # Factory rebuild so HF re-pulls the image fresh.
          curl -X POST \
            "https://huggingface.co/api/spaces/${HF_USERNAME}/${HF_SPACE_NAME}/restart?factory=true" \
            -H "Authorization: Bearer ${HF_TOKEN}"