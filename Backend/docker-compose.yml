version: "3.8"

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: mental-health-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"    # OTLP gRPC  (app → collector)
      - "4318:4318"    # OTLP HTTP  (app → collector)
    env_file:
      - .env           # AXIOM_API_TOKEN & AXIOM_DATASET
    restart: unless-stopped
    networks:
      - observability

networks:
  observability:
    driver: bridge